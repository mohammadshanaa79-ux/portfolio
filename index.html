<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة XO - Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="background-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-x">X</span>
                <span class="logo-vs">VS</span>
                <span class="logo-o">O</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="تبديل الثيم">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </header>

        <!-- Game Mode Selection -->
        <div class="mode-selection">
            <button class="mode-btn active" data-mode="ai" onclick="selectMode('ai')">
                <span class="icon">🤖</span>
                <span class="text">ضد الذكاء الاصطناعي</span>
            </button>
            <button class="mode-btn" data-mode="friend" onclick="selectMode('friend')">
                <span class="icon">👥</span>
                <span class="text">ضد صديق</span>
            </button>
        </div>

        <!-- Player Selection (for AI mode) -->
        <div class="player-selection" id="playerSelection">
            <h3>اختر رمزك:</h3>
            <div class="player-buttons">
                <button class="player-btn active" data-player="X" onclick="selectPlayer('X')">
                    <span class="player-symbol">X</span>
                </button>
                <button class="player-btn" data-player="O" onclick="selectPlayer('O')">
                    <span class="player-symbol">O</span>
                </button>
            </div>
        </div>

        <!-- Difficulty Selection -->
        <div class="difficulty-selection" id="difficultySelection">
            <h3>مستوى الصعوبة:</h3>
            <div class="difficulty-buttons">
                <button class="diff-btn" data-level="easy" onclick="selectDifficulty('easy')">
                    <span class="diff-icon">😊</span>
                    <span class="diff-text">سهل</span>
                </button>
                <button class="diff-btn active" data-level="medium" onclick="selectDifficulty('medium')">
                    <span class="diff-icon">😐</span>
                    <span class="diff-text">متوسط</span>
                </button>
                <button class="diff-btn" data-level="hard" onclick="selectDifficulty('hard')">
                    <span class="diff-icon">😈</span>
                    <span class="diff-text">صعب</span>
                </button>
            </div>
        </div>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="score-card player-x">
                <div class="score-icon">X</div>
                <div class="score-value" id="scoreX">0</div>
                <div class="score-label" id="labelX">أنت</div>
            </div>
            <div class="score-card draws">
                <div class="score-icon">🤝</div>
                <div class="score-value" id="scoreDraw">0</div>
                <div class="score-label">تعادل</div>
            </div>
            <div class="score-card player-o">
                <div class="score-icon">O</div>
                <div class="score-value" id="scoreO">0</div>
                <div class="score-label" id="labelO">الذكاء الاصطناعي</div>
            </div>
        </div>

        <!-- Current Turn Indicator -->
        <div class="turn-indicator" id="turnIndicator">
            <span class="turn-text">الدور:</span>
            <span class="turn-player" id="currentTurn">X</span>
        </div>

        <!-- Game Board -->
        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0" onclick="handleCellClick(0)"></div>
            <div class="cell" data-index="1" onclick="handleCellClick(1)"></div>
            <div class="cell" data-index="2" onclick="handleCellClick(2)"></div>
            <div class="cell" data-index="3" onclick="handleCellClick(3)"></div>
            <div class="cell" data-index="4" onclick="handleCellClick(4)"></div>
            <div class="cell" data-index="5" onclick="handleCellClick(5)"></div>
            <div class="cell" data-index="6" onclick="handleCellClick(6)"></div>
            <div class="cell" data-index="7" onclick="handleCellClick(7)"></div>
            <div class="cell" data-index="8" onclick="handleCellClick(8)"></div>
        </div>

        <!-- Move Counter -->
        <div class="move-counter">
            <span>عدد الحركات: </span>
            <span id="moveCount">0</span>
        </div>

        <!-- Control Buttons -->
        <div class="controls">
            <button class="control-btn restart-btn" onclick="restartGame()">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">إعادة اللعبة</span>
            </button>
            <button class="control-btn reset-btn" onclick="resetScores()">
                <span class="btn-icon">📊</span>
                <span class="btn-text">إعادة النتائج</span>
            </button>
        </div>

        <!-- Sound Toggle -->
        <div class="sound-toggle">
            <button class="sound-btn" onclick="toggleSound()">
                <span class="sound-on">🔊</span>
                <span class="sound-off">🔇</span>
            </button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🏆</div>
            <h2 class="modal-title" id="modalTitle">فوز!</h2>
            <p class="modal-message" id="modalMessage">اللاعب X فاز!</p>
            <div class="modal-buttons">
                <button class="modal-btn play-again" onclick="playAgain()">
                    <span>العب مرة أخرى</span>
                </button>
                <button class="modal-btn change-mode" onclick="closeModal()">
                    <span>تغيير الإعدادات</span>
                </button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
